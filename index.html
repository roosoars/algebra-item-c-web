<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecionando | Algebra Item C</title>
    <meta
      name="description"
      content="Redirecionamento para a versão estática publicada do item C."
    />
    <script type="module">
      const destinoPublicacao = new URL("./dist/", window.location.href).toString();
      import("/src/main.tsx")
        .then(() => {
          document.getElementById("mensagem-redirecionamento")?.remove();
        })
        .catch(() => {
          window.location.replace(destinoPublicacao);
        });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <p id="mensagem-redirecionamento">
      Redirecionando para a aplicação publicada...
      <a href="./dist/">Abrir manualmente</a>
    </p>
  </body>
</html>
